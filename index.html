<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phanindra | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#020617;
  --text:#fff;
  --accent:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
  width:20px;
  height:20px;
  border:2px solid #38bdf8;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

/* HERO */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  font-size:100px;
  font-weight:900;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

#typing{
  font-size:25px;
  margin-top:10px;
  color:#94a3b8;
}

/* BUTTONS */
.links a{
  margin:10px;
  padding:14px 24px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  text-decoration:none;
  color:white;
  position:relative;
  transition:0.3s;
}

.links a:hover{
  transform:scale(1.1);
  background:linear-gradient(90deg,#38bdf8,#22c55e);
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:100px auto;
  padding:20px;
}

h2{
  font-size:32px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* 3D CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  transition:0.2s;
  transform-style:preserve-3d;
}

.card:hover{
  box-shadow:0 20px 60px rgba(56,189,248,0.3);
}

/* SKILLS */
.skills span{
  display:inline-block;
  padding:10px 15px;
  margin:6px;
  border-radius:20px;
  background:#38bdf8;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<header>
  <h1>PHANINDRA</h1>
  <p id="typing"></p>

  <div class="links">
    <a href="resume.pdf">Resume</a>
    <a href="resume.pdf" download>Download</a>
    <a href="https://github.com/Phani-2005hero">GitHub</a>
    <a href="https://www.linkedin.com/in/thirunagari-phanindra-16478334a">LinkedIn</a>
  </div>
</header>

<section>
<h2>About</h2>
<div class="card">Building high-impact projects in Web, ML & Games 🚀</div>
</section>

<section>
<h2>Skills</h2>
<div class="skills">
<span>Python</span>
<span>Java</span>
<span>JavaScript</span>
<span>ML</span>
<span>SQL</span>
</div>
</section>

<section>
<h2>Projects</h2>
<div class="grid">

<div class="card tilt">
<h3>Zombie Game 🎮</h3>
<p>Unity survival experience</p>
<a href="https://github.com/jashwanthreddy21/GMDD-Zombie-Game.git">View</a>
</div>

<div class="card tilt">
<h3>Career Roadmap</h3>
<p>Interactive planner</p>
</div>

</div>
</section>

<footer>© 2026 Phanindra</footer>

<script>
// TYPING
const roles=["Full Stack Dev","ML Enthusiast","Game Dev"];
let i=0,j=0,del=false;

function type(){
let txt=roles[i];
document.getElementById("typing").innerText=txt.substring(0,j);

if(!del&&j<txt.length) j++;
else if(del&&j>0) j--;
else{
del=!del;
if(!del) i=(i+1)%roles.length;
}
setTimeout(type,del?50:100);
}
type();

// CURSOR
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// 3D TILT EFFECT
document.querySelectorAll(".tilt").forEach(card=>{
card.addEventListener("mousemove",(e)=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const rotateX=-(y/rect.height-0.5)*20;
const rotateY=(x/rect.width-0.5)*20;

card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});
</script>

</body>
</html>
